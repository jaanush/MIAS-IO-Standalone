services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mias
      POSTGRES_PASSWORD: mias_dev
      POSTGRES_DB: mias_io
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mias -d mias_io"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
